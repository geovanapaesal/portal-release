<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amigo Flow – Documentação</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --brand:     #008CFF;
    --brand-dk:  #0070CC;
    --brand-50:  #E6F4FF;
    --brand-100: #CCE9FF;
    --bg:        #F8F9FA;
    --surface:   #FFFFFF;
    --border:    #E9ECEF;
    --text:      #0F172A;
    --text-2:    #334155;
    --text-3:    #64748B;
    --success:   #22C55E;
    --success-bg:#DCFCE7;
    --warning:   #F59E0B;
    --warning-bg:#FEF3C7;
    --danger:    #EF4444;
    --danger-bg: #FEF2F2;
    --purple:    #8B5CF6;
    --purple-bg: #EDE9FE;
    --sidebar-bg:#0F172A;
    --sidebar-w: 280px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{font-family:'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;background:var(--bg);color:var(--text);display:flex;flex-direction:column}

  /* ── TOPBAR ── */
  .topbar{height:52px;background:var(--sidebar-bg);border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0;z-index:100}
  .topbar-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
  .logo-icon{width:28px;height:28px;background:var(--brand);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
  .logo-name{font-size:14px;font-weight:700;color:#fff;letter-spacing:-.3px}
  .topbar-sep{width:1px;height:16px;background:rgba(255,255,255,.1)}
  .topbar-nav{display:flex;gap:2px}
  .topbar-link{font-size:12px;font-weight:500;color:rgba(255,255,255,.4);text-decoration:none;padding:4px 9px;border-radius:5px;transition:all .15s}
  .topbar-link:hover{color:#fff;background:rgba(255,255,255,.07)}
  .topbar-link.active{color:#fff;background:rgba(0,140,255,.2)}
  .topbar-search{margin-left:auto;display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:5px 10px;cursor:text}
  .topbar-search svg{color:rgba(255,255,255,.3);flex-shrink:0}
  .topbar-search input{background:none;border:none;outline:none;font-family:inherit;font-size:12px;color:#fff;width:180px}
  .topbar-search input::placeholder{color:rgba(255,255,255,.3)}

  /* ── LAYOUT ── */
  .layout{display:flex;flex:1;overflow:hidden}

  /* ── SIDEBAR ── */
  .sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--sidebar-bg);display:flex;flex-direction:column;overflow:hidden;border-right:1px solid rgba(255,255,255,.04)}
  .sidebar-list{flex:1;overflow-y:auto;padding:8px 0 20px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent}
  .sidebar-list::-webkit-scrollbar{width:3px}
  .sidebar-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}

  .nav-section{margin-bottom:2px}
  .nav-section-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.2);padding:14px 20px 5px;display:flex;align-items:center;gap:6px}
  .nav-item{display:flex;align-items:center;gap:8px;padding:7px 20px;cursor:pointer;color:rgba(255,255,255,.5);font-size:12.5px;font-weight:500;border-left:2px solid transparent;transition:all .12s;text-decoration:none;border:none;background:none;width:100%;text-align:left;font-family:inherit}
  .nav-item:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.04)}
  .nav-item.active{color:#fff;background:rgba(0,140,255,.12);border-left:2px solid var(--brand)}
  .nav-item-icon{font-size:13px;flex-shrink:0;width:16px;text-align:center}
  .nav-sub{padding-left:12px}
  .nav-sub .nav-item{font-size:12px;padding:6px 20px 6px 16px;color:rgba(255,255,255,.35)}
  .nav-sub .nav-item:hover{color:rgba(255,255,255,.7)}
  .nav-sub .nav-item.active{color:#fff}

  /* ── MAIN ── */
  .main{flex:1;overflow-y:auto;background:var(--bg)}
  .main::-webkit-scrollbar{width:5px}
  .main::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

  /* ── DOC CONTENT ── */
  .doc-wrap{max-width:820px;padding:44px 48px 80px}

  /* breadcrumb */
  .breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-3);margin-bottom:20px}
  .breadcrumb a{color:var(--brand);text-decoration:none}
  .breadcrumb a:hover{text-decoration:underline}
  .breadcrumb-sep{color:var(--border)}

  /* page title */
  .doc-title{font-size:30px;font-weight:800;color:var(--text);letter-spacing:-.8px;line-height:1.15;margin-bottom:8px;display:flex;align-items:center;gap:12px}
  .doc-title-icon{font-size:26px}
  .doc-lead{font-size:15px;color:var(--text-3);line-height:1.7;margin-bottom:28px;padding-bottom:24px;border-bottom:1px solid var(--border);max-width:640px}

  /* typography */
  .doc-h2{font-size:20px;font-weight:700;color:var(--text);margin:32px 0 12px;letter-spacing:-.3px}
  .doc-h3{font-size:15px;font-weight:700;color:var(--text);margin:22px 0 8px}
  .doc-p{font-size:14px;color:var(--text-2);line-height:1.75;margin-bottom:14px}
  .doc-p strong{color:var(--text);font-weight:600}
  .doc-ul{padding-left:20px;margin-bottom:14px;display:flex;flex-direction:column;gap:5px}
  .doc-ul li{font-size:14px;color:var(--text-2);line-height:1.65}
  .doc-ul li strong{color:var(--text)}
  .doc-ol{padding-left:20px;margin-bottom:14px;display:flex;flex-direction:column;gap:5px}
  .doc-ol li{font-size:14px;color:var(--text-2);line-height:1.65}
  .doc-divider{height:1px;background:var(--border);margin:28px 0}
  .ic{font-family:monospace;font-size:12px;background:var(--bg);border:1px solid var(--border);padding:1px 5px;border-radius:3px;color:var(--brand)}

  /* hint boxes */
  .hint{border-radius:8px;padding:13px 16px;margin-bottom:16px;display:flex;gap:10px;align-items:flex-start}
  .hint-icon{font-size:14px;flex-shrink:0;margin-top:1px}
  .hint-body{font-size:13px;line-height:1.65}
  .hint-body strong{font-weight:600}
  .hint.info{background:var(--brand-50);border:1px solid var(--brand-100);color:#1e40af}
  .hint.warning{background:var(--warning-bg);border:1px solid #fde68a;color:#92400e}
  .hint.success{background:var(--success-bg);border:1px solid #bbf7d0;color:#14532d}
  .hint.danger{background:var(--danger-bg);border:1px solid #fecaca;color:#991b1b}

  /* table */
  .doc-table-wrap{overflow-x:auto;margin-bottom:18px;border-radius:8px;border:1px solid var(--border)}
  .doc-table{width:100%;border-collapse:collapse;font-size:13px}
  .doc-table th{background:var(--bg);padding:10px 14px;text-align:left;font-weight:600;color:var(--text);border-bottom:1px solid var(--border);white-space:nowrap}
  .doc-table td{padding:9px 14px;border-bottom:1px solid var(--border);color:var(--text-2);line-height:1.5}
  .doc-table tr:last-child td{border-bottom:none}
  .doc-table tr:hover td{background:var(--bg)}

  /* code */
  .doc-code{font-family:monospace;font-size:12px;background:#1e293b;color:#e2e8f0;border-radius:8px;padding:14px 18px;margin-bottom:14px;overflow-x:auto;line-height:1.65}

  /* cards grid (overview) */
  .doc-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:24px}
  .doc-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all .15s;text-align:left;border:none;font-family:inherit}
  .doc-card:hover{border:1px solid var(--brand-100);box-shadow:0 4px 16px rgba(0,140,255,.07);transform:translateY(-1px)}
  .doc-card-icon{font-size:20px;margin-bottom:8px}
  .doc-card-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px}
  .doc-card-desc{font-size:12px;color:var(--text-3);line-height:1.5}

  /* search overlay */
  .search-results{display:none;position:absolute;top:52px;left:0;right:0;background:var(--surface);border-bottom:1px solid var(--border);box-shadow:0 8px 24px rgba(0,0,0,.08);z-index:200;max-height:400px;overflow-y:auto;padding:8px}
  .search-results.open{display:block}
  .search-result-item{padding:10px 14px;border-radius:6px;cursor:pointer;display:flex;flex-direction:column;gap:3px;transition:background .1s}
  .search-result-item:hover{background:var(--bg)}
  .sri-title{font-size:13px;font-weight:600;color:var(--text)}
  .sri-section{font-size:11px;color:var(--text-3)}
  .search-empty{padding:24px;text-align:center;font-size:13px;color:var(--text-3)}

  /* github source link */
  .gh-link{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--text-3);text-decoration:none;padding:3px 8px;border:1px solid var(--border);border-radius:5px;margin-bottom:20px;transition:all .15s}
  .gh-link:hover{color:var(--brand);border-color:var(--brand-100);background:var(--brand-50)}

  /* empty */
  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--text-3);text-align:center;padding:40px}
  .empty-state .ei{font-size:40px}
  .empty-state h3{font-size:16px;font-weight:700;color:var(--text-2)}
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar" style="position:relative">
  <a href="index.html" class="topbar-logo">
    <div class="logo-icon">🌊</div>
    <span class="logo-name">Amigo Flow</span>
  </a>
  <div class="topbar-sep"></div>
  <nav class="topbar-nav">
    <a href="index.html" class="topbar-link">Home</a>
    <a href="amigo-flow-release-portal.html" class="topbar-link">Release Notes</a>
    <a href="amigo-flow-docs.html" class="topbar-link active">Documentação</a>
  </nav>
  <div class="topbar-search" onclick="document.getElementById('searchBox').focus()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="searchBox" placeholder="Buscar na documentação…" oninput="doSearch(this.value)" onblur="setTimeout(()=>closeSearch(),200)">
  </div>
  <div class="search-results" id="searchResults"></div>
</header>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-list" id="sidebarList"></div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="mainContent">
    <div class="empty-state">
      <div class="ei">📖</div>
      <h3>Selecione um tópico</h3>
      <p>Navegue pela documentação completa do Amigo Flow.</p>
    </div>
  </main>

</div>

<script>
// ─── NAV TREE ─────────────────────────────────────────────────────────────────
const GH_RAW = 'https://raw.githubusercontent.com/geovanapaesal/Doc-Amigo-Flow/main/';
const GH_BLOB = 'https://github.com/geovanapaesal/Doc-Amigo-Flow/blob/main/';

const tree = [
  { id:'welcome', label:'Bem-vindo ao Amigo Flow', icon:'🚀' },
  { id:'prereq',  label:'O que preciso para conectar?', icon:'📱' },
  {
    section:'Atalhos', icon:'⚡', items:[
      { id:'novidades', label:'Novidades do Flow', icon:'✨', children:[
        { id:'novidades-qrcode',    label:'Conectar via QR Code (Coexistência)' },
        { id:'novidades-banimento', label:'Agente Flow pode ser banido?' },
        { id:'novidades-lgpd',      label:'Consentimento LGPD (Opt-in)' },
        { id:'novidades-link',      label:'Novo modo de agendamento via link' },
        { id:'novidades-agente',    label:'Configuração de conhecimento do Agente' },
        { id:'novidades-avaliacao', label:'Avaliação de Atendimento' },
        { id:'novidades-kanban',    label:'Chat do Flow no Kanban do Agende+' },
        { id:'novidades-templates', label:'Templates com variáveis personalizadas' },
      ]},
      { id:'faq', label:'FAQ', icon:'❓', children:[
        { id:'faq-atendimento',  label:'O que conta como 1 Atendimento' },
        { id:'faq-janela',       label:'Como funciona a janela da Meta' },
        { id:'faq-portfolio',    label:'Como criar portfólio empresarial' },
        { id:'faq-verificar',    label:'Como verificar empresa na Meta' },
        { id:'faq-2fa',          label:'Desativar autenticação 2FA' },
        { id:'faq-associar',     label:'Como associar número no Flow' },
        { id:'faq-erros',        label:'Código de erros de envio' },
        { id:'faq-suporte',      label:'Acessar página de suporte da Meta' },
        { id:'faq-portabilidade',label:'Portabilidade de número com API' },
        { id:'faq-banimento',    label:'Solicitar revisão de banimento' },
        { id:'faq-remover',      label:'Remover número do portfólio' },
      ]},
    ]
  },
  {
    section:'Funcionalidades', icon:'⚙️', items:[
      { id:'func-agente',    label:'Guia do Agente Flow', icon:'🤖' },
      { id:'func-dashboard', label:'Dashboard de Atendimentos', icon:'📊' },
      { id:'func-chats',     label:'Chats', icon:'💬' },
      { id:'func-paineis',   label:'Painéis', icon:'📋' },
      { id:'func-envios',    label:'Envios', icon:'📨', children:[
        { id:'func-envios-auto',  label:'Envios Automáticos' },
        { id:'func-envios-massa', label:'Envios em Massa' },
      ]},
      { id:'func-leads',     label:'Leads', icon:'👥' },
      { id:'func-config',    label:'Configurações', icon:'⚙️', children:[
        { id:'func-canais',     label:'Canais' },
        { id:'func-modelos',    label:'Criar modelos de mensagens' },
        { id:'func-atalhos',    label:'Atalhos de mensagens' },
        { id:'func-permissoes', label:'Permissões e Setores' },
        { id:'func-avaliacao',  label:'Avaliação de Atendimento' },
      ]},
      { id:'func-consumo', label:'Consumo', icon:'📈' },
    ]
  },
];

// ─── ALL PAGES (searchable index) ─────────────────────────────────────────────
const allPages = [];
function indexTree(nodes, section='') {
  for (const n of nodes) {
    if (n.section) { indexTree(n.items, n.section); continue; }
    allPages.push({ id:n.id, label:n.label, section });
    if (n.children) indexTree(n.children, section || n.label);
  }
}
indexTree(tree);

// ─── SIDEBAR BUILD ────────────────────────────────────────────────────────────
let currentId = null;

function buildSidebar() {
  const el = document.getElementById('sidebarList');
  el.innerHTML = '';
  function makeItem(node, isSub) {
    const btn = document.createElement('button');
    btn.className = 'nav-item' + (isSub ? '' : '');
    btn.dataset.id = node.id;
    btn.innerHTML = `${node.icon ? `<span class="nav-item-icon">${node.icon}</span>` : '<span class="nav-item-icon"></span>'}<span>${node.label}</span>`;
    btn.addEventListener('click', () => showPage(node.id));
    return btn;
  }

  for (const node of tree) {
    if (node.section) {
      const sec = document.createElement('div');
      sec.className = 'nav-section';
      const title = document.createElement('div');
      title.className = 'nav-section-title';
      title.innerHTML = `<span>${node.icon}</span>${node.section}`;
      sec.appendChild(title);
      for (const item of node.items) {
        sec.appendChild(makeItem(item, false));
        if (item.children) {
          const sub = document.createElement('div');
          sub.className = 'nav-sub';
          item.children.forEach(ch => sub.appendChild(makeItem(ch, true)));
          sec.appendChild(sub);
        }
      }
      el.appendChild(sec);
    } else {
      el.appendChild(makeItem(node, false));
    }
  }
}

function setActive(id) {
  document.querySelectorAll('.nav-item').forEach(b =>
    b.classList.toggle('active', b.dataset.id === id));
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const h2  = t => `<h2 class="doc-h2">${t}</h2>`;
const h3  = t => `<h3 class="doc-h3">${t}</h3>`;
const p   = t => `<p class="doc-p">${t}</p>`;
const ul  = items => `<ul class="doc-ul">${items.map(i=>`<li>${i}</li>`).join('')}</ul>`;
const ol  = items => `<ol class="doc-ol">${items.map(i=>`<li>${i}</li>`).join('')}</ol>`;
const div = () => `<div class="doc-divider"></div>`;
const ic  = t => `<span class="ic">${t}</span>`;
const hint = (type, icon, html) => `<div class="hint ${type}"><div class="hint-icon">${icon}</div><div class="hint-body">${html}</div></div>`;
const table = (heads, rows) =>
  `<div class="doc-table-wrap"><table class="doc-table">
    <thead><tr>${heads.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
    <tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody>
  </table></div>`;
const ghLink = path => `<a class="gh-link" href="${GH_BLOB}${path}" target="_blank">
  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
  Ver fonte no GitHub
</a>`;

function page(id, icon, title, subtitle, ghPath, body) {
  const bc = allPages.find(p=>p.id===id);
  const section = bc?.section;
  return `<div class="doc-wrap">
    <div class="breadcrumb">
      <a href="#" onclick="showPage('welcome')">Docs</a>
      ${section ? `<span class="breadcrumb-sep">›</span><span>${section}</span>` : ''}
      <span class="breadcrumb-sep">›</span><span>${title}</span>
    </div>
    ${ghPath ? ghLink(ghPath) : ''}
    <div class="doc-title"><span class="doc-title-icon">${icon}</span>${title}</div>
    ${subtitle ? `<p class="doc-lead">${subtitle}</p>` : ''}
    ${body}
  </div>`;
}

// ─── PAGE CONTENT ─────────────────────────────────────────────────────────────
const pages = {

welcome: () => page('welcome','🚀','Bem-vindo ao Amigo Flow','O Amigo Flow é o coração da comunicação entre pacientes e equipe — onde cada conversa se transforma em relacionamento e cada fluxo em resultado.','README.md',
  `${h2('Comece por aqui')}
  <div class="doc-cards">
    ${[
      ['prereq','📱','O que preciso para conectar?','Pré-requisitos para usar a API Oficial'],
      ['func-agente','🤖','Guia do Agente Flow','Como a IA funciona e o que ela faz'],
      ['func-chats','💬','Chats','Central de atendimentos em tempo real'],
      ['faq','❓','FAQ','Dúvidas mais frequentes'],
      ['func-envios-auto','📨','Envios Automáticos','Automatize mensagens na jornada'],
      ['func-consumo','📈','Consumo','Entenda como a franquia é consumida'],
    ].map(([id,ic,t,d])=>`<button class="doc-card" onclick="showPage('${id}')"><div class="doc-card-icon">${ic}</div><div class="doc-card-title">${t}</div><div class="doc-card-desc">${d}</div></button>`).join('')}
  </div>
  ${hint('info','💙','Use a aba <strong>Release Notes</strong> para acompanhar o histórico de versões do produto com contexto e impacto de cada entrega.')}`
),

prereq: () => page('prereq','📱','O que é preciso para conectar ao Amigo Flow?','Este documento orienta o que é necessário para usar a API Oficial do WhatsApp na sua clínica.','o-que-e-preciso-para-ter-um-numero-conectado-ao-amigo-flow.md',
  `${hint('info','💡','As regras abaixo <strong>não são uma escolha da Amigo</strong>. Fazem parte do modelo oficial do WhatsApp Business Platform, aplicado igualmente para todas as empresas no mundo.')}
  ${h2('1. Conta no Facebook Business Manager')}
  ${p('Você precisa de uma conta comercial ativa no Facebook (Business Manager), com mais de 30 dias e você sendo administrador.')}
  ${h2('2. Portfólio Empresarial no Meta')}
  ${p(`Acesse <strong>business.facebook.com</strong> e crie seu portfólio empresarial. <button onclick="showPage('faq-portfolio')" style="background:none;border:none;color:var(--brand);cursor:pointer;font-size:14px;font-weight:600;padding:0">Ver guia completo →</button>`)}
  ${h2('3. Empresa verificada pela Meta')}
  ${p('A Meta exige empresa real, ativa e identificável. Você precisará de:')}
  ${ul(['Razão social e CNPJ válidos','Site institucional ativo','Domínio do site verificado no Business Manager','Documento oficial da empresa (ex: contrato social)'])}
  ${h2('4. Número de telefone elegível')}
  ${p('O número precisa estar livre para uso em API e conseguir receber SMS ou ligação para verificação. Números fixos também funcionam!')}
  ${hint('warning','⚠️','Números usados em ferramentas não oficiais têm maior risco de bloqueio após migração.')}
  ${h2('Resumo')}
  ${ul(['✔ Conta comercial no Facebook ativa','✔ Portfólio empresarial criado','✔ Empresa verificada','✔ Número de telefone elegível'])}`
),

// ── NOVIDADES ──────────────────────────────────────────────────────────────────
novidades: () => page('novidades','✨','Novidades do Flow','Últimas funcionalidades e melhorias lançadas no Amigo Flow.','atalhos/novidades-do-flow/README.md',
  `<div class="doc-cards">

// ─── SHOW PAGE ────────────────────────────────────────────────────────────────
function showPage(id) {
  currentId = id;
  setActive(id);
  const render = pages[id];
  const main = document.getElementById('mainContent');
  if (!render) {
    main.innerHTML = `<div class="empty-state"><div class="ei">🚧</div><h3>Em breve</h3><p>Esta página está sendo elaborada.</p></div>`;
    return;
  }
  main.innerHTML = render();
  main.scrollTop = 0;
}

// ─── SEARCH ──────────────────────────────────────────────────────────────────
function doSearch(q) {
  const box = document.getElementById('searchResults');
  if (!q.trim()) { box.classList.remove('open'); return; }
  const ql = q.toLowerCase();
  const matches = allPages.filter(p =>
    p.label.toLowerCase().includes(ql) ||
    (p.section && p.section.toLowerCase().includes(ql))
  ).slice(0, 8);
  if (!matches.length) {
    box.innerHTML = `<div class="search-empty">Nenhum resultado para "${q}"</div>`;
  } else {
    box.innerHTML = matches.map(m => `
      <div class="search-result-item" onclick="showPage('${m.id}');closeSearch()">
        <div class="sri-title">${m.label}</div>
        ${m.section ? `<div class="sri-section">${m.section}</div>` : ''}
      </div>`).join('');
  }
  box.classList.add('open');
}

function closeSearch() {
  document.getElementById('searchResults').classList.remove('open');
  document.getElementById('searchBox').value = '';
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
buildSidebar();

// check ?doc= url param
const urlDoc = new URLSearchParams(location.search).get('doc');
if (urlDoc && pages[urlDoc]) showPage(urlDoc);
else showPage('welcome');
