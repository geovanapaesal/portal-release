<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Amigo Flow – Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:       #ffffff;
  --bg2:      #f8f9fc;
  --bg3:      #f0f2f7;
  --border:   #e4e7ef;
  --border2:  #d0d5e8;
  --blue:     #2563eb;
  --blue-lt:  #eff4ff;
  --blue-md:  #dbeafe;
  --blue-dk:  #1d4ed8;
  --green:    #16a34a;
  --green-lt: #f0fdf4;
  --amber:    #d97706;
  --amber-lt: #fffbeb;
  --red:      #dc2626;
  --red-lt:   #fef2f2;
  --purple:   #7c3aed;
  --purple-lt:#f5f3ff;
  --text:     #0f172a;
  --text2:    #475569;
  --text3:    #94a3b8;
  --sidebar:  260px;
  --topbar:   52px;
  --radius:   10px;
  --radius-sm:6px;
  --shadow:   0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(0,0,0,.08), 0 2px 6px rgba(0,0,0,.04);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;font-size:14px;line-height:1.6}

/* ── TOPBAR ── */
.topbar{
  height:var(--topbar);background:#fff;border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:12px;
  position:sticky;top:0;z-index:200;
}
.topbar-logo{font-size:15px;font-weight:800;color:var(--text);text-decoration:none;letter-spacing:-.3px}
.topbar-logo em{color:var(--blue);font-style:normal}
.topbar-sep{width:1px;height:18px;background:var(--border)}
.topbar-product{
  font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;
  color:var(--blue);background:var(--blue-lt);border:1px solid var(--blue-md);
  padding:2px 8px;border-radius:4px
}
.topbar-tabs{display:flex;gap:2px;margin-left:auto}
.tab-btn{
  padding:6px 14px;border-radius:var(--radius-sm);border:none;cursor:pointer;
  font-family:inherit;font-size:13px;font-weight:600;
  background:none;color:var(--text2);transition:all .15s
}
.tab-btn:hover{background:var(--bg3);color:var(--text)}
.tab-btn.active{background:var(--blue);color:#fff}
.topbar-home{font-size:12px;color:var(--text3);text-decoration:none;display:flex;align-items:center;gap:4px;padding:5px 8px;border-radius:var(--radius-sm);transition:background .15s;margin-right:4px}
.topbar-home:hover{background:var(--bg3);color:var(--text2)}

/* ── LAYOUT ── */
.layout{display:flex;flex:1;height:calc(100vh - var(--topbar));overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sidebar);min-width:var(--sidebar);
  background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;transition:transform .2s
}
.sidebar-header{padding:16px 14px 10px;border-bottom:1px solid var(--border)}
.sidebar-label{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase}
.sidebar-search{
  display:flex;align-items:center;gap:6px;
  background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:6px 10px;margin-top:10px
}
.sidebar-search input{border:none;outline:none;background:none;font-family:inherit;font-size:12px;color:var(--text);width:100%}
.sidebar-search input::placeholder{color:var(--text3)}
.search-icon{color:var(--text3);font-size:12px;flex-shrink:0}
.sidebar-list{flex:1;overflow-y:auto;padding:6px}
.sidebar-list::-webkit-scrollbar{width:3px}
.sidebar-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* releases sidebar */
.year-group{margin-bottom:4px}
.year-label{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase;padding:10px 10px 4px}
.release-btn{
  width:100%;background:none;border:none;cursor:pointer;
  padding:8px 10px;border-radius:var(--radius-sm);text-align:left;
  transition:background .12s;display:flex;flex-direction:column;gap:2px;margin-bottom:1px
}
.release-btn:hover{background:var(--bg3)}
.release-btn.active{background:var(--blue-lt);border-left:2px solid var(--blue);padding-left:8px}
.rb-name{font-size:13px;font-weight:700;color:var(--text)}
.release-btn.active .rb-name{color:var(--blue)}
.rb-date{font-size:11px;color:var(--text3)}
.rb-pill{
  display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;
  padding:1px 6px;border-radius:20px;margin-top:2px
}
.rb-pill.released{background:var(--green-lt);color:var(--green)}
.rb-pill.upcoming{background:var(--amber-lt);color:var(--amber)}
.rb-pill::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}

/* docs sidebar */
.doc-section{margin-bottom:2px}
.doc-section-title{
  font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--text2);text-transform:uppercase;
  padding:10px 10px 4px;display:flex;align-items:center;gap:6px
}
.doc-section-title .si{font-size:12px}
.doc-item{
  width:100%;background:none;border:none;cursor:pointer;
  padding:7px 10px 7px 22px;border-radius:var(--radius-sm);text-align:left;
  font-family:inherit;font-size:12.5px;color:var(--text2);
  transition:background .12s;display:block;margin-bottom:1px;font-weight:500
}
.doc-item:hover{background:var(--bg3);color:var(--text)}
.doc-item.active{background:var(--blue-lt);color:var(--blue);font-weight:600}
.doc-sub-item{
  width:100%;background:none;border:none;cursor:pointer;
  padding:5px 10px 5px 32px;border-radius:var(--radius-sm);text-align:left;
  font-family:inherit;font-size:12px;color:var(--text3);
  transition:background .12s;display:block;margin-bottom:1px
}
.doc-sub-item:hover{background:var(--bg3);color:var(--text2)}
.doc-sub-item.active{background:var(--blue-lt);color:var(--blue);font-weight:600}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;background:var(--bg)}
.main::-webkit-scrollbar{width:5px}
.main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:5px}

/* ── EMPTY STATE ── */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:10px;color:var(--text3);padding:40px;text-align:center
}
.empty-icon{font-size:40px;opacity:.4}
.empty-state h3{font-size:15px;color:var(--text2);font-weight:600}
.empty-state p{font-size:13px;max-width:240px;line-height:1.6}

/* ── RELEASE DETAIL ── */
.release-detail{padding:36px 44px 80px;max-width:860px}
.rd-header{margin-bottom:28px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.rd-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.rd-version{font-size:26px;font-weight:800;color:var(--text);letter-spacing:-.4px}
.rd-pill{
  display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;
  padding:3px 10px;border-radius:20px
}
.rd-pill.released{background:var(--green-lt);color:var(--green);border:1px solid #bbf7d0}
.rd-pill.upcoming{background:var(--amber-lt);color:var(--amber);border:1px solid #fde68a}
.rd-pill::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor}
.rd-date{font-size:12px;color:var(--text3);margin-bottom:8px}
.rd-desc{font-size:14px;color:var(--text2);line-height:1.7;max-width:640px}

.features-count{
  font-size:10px;font-weight:700;letter-spacing:1px;color:var(--text3);
  text-transform:uppercase;margin-bottom:14px
}

/* ── FEATURE CARD ── */
.feature-card{
  background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;margin-bottom:12px;transition:box-shadow .15s,border-color .15s
}
.feature-card:hover{box-shadow:var(--shadow-md);border-color:var(--border2)}
.fc-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px}
.fc-title{font-size:15px;font-weight:700;color:var(--text);line-height:1.3}
.fc-jira{
  flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;
  color:var(--blue);background:var(--blue-lt);border:1px solid var(--blue-md);
  padding:3px 8px;border-radius:4px;text-decoration:none;transition:background .12s;white-space:nowrap
}
.fc-jira:hover{background:var(--blue-md)}
.fc-rows{display:flex;flex-direction:column;gap:10px}
.fc-row{display:flex;gap:10px;align-items:flex-start}
.fc-icon{
  width:22px;height:22px;border-radius:6px;display:flex;align-items:center;
  justify-content:center;font-size:11px;flex-shrink:0;margin-top:1px
}
.fc-icon.ctx{background:var(--purple-lt);color:var(--purple)}
.fc-icon.done{background:var(--green-lt);color:var(--green)}
.fc-icon.imp{background:var(--blue-lt);color:var(--blue)}
.fc-body{}
.fc-label{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text3);margin-bottom:2px}
.fc-text{font-size:13px;color:var(--text2);line-height:1.65}

/* ── DOC PAGE ── */
.doc-page{padding:36px 44px 80px;max-width:860px}
.doc-breadcrumb{font-size:12px;color:var(--text3);margin-bottom:18px;display:flex;align-items:center;gap:6px}
.doc-breadcrumb a{color:var(--blue);text-decoration:none}
.doc-breadcrumb span{color:var(--text3)}
.doc-h1{font-size:26px;font-weight:800;color:var(--text);letter-spacing:-.4px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.doc-h1 .dicon{font-size:22px}
.doc-subtitle{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border);max-width:640px}
.doc-h2{font-size:18px;font-weight:700;color:var(--text);margin:28px 0 12px;letter-spacing:-.2px}
.doc-h3{font-size:15px;font-weight:700;color:var(--text);margin:20px 0 8px}
.doc-p{font-size:13.5px;color:var(--text2);line-height:1.75;margin-bottom:12px}
.doc-p strong{color:var(--text);font-weight:600}
.doc-ul{padding-left:20px;margin-bottom:12px;display:flex;flex-direction:column;gap:4px}
.doc-ul li{font-size:13.5px;color:var(--text2);line-height:1.65}
.doc-ul li strong{color:var(--text)}
.doc-ol{padding-left:20px;margin-bottom:12px;display:flex;flex-direction:column;gap:4px}
.doc-ol li{font-size:13.5px;color:var(--text2);line-height:1.65}

/* hint boxes */
.hint{border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:14px;display:flex;gap:10px;align-items:flex-start}
.hint-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.hint-body{font-size:13px;line-height:1.65}
.hint-body strong{font-weight:600}
.hint.info{background:var(--blue-lt);border:1px solid var(--blue-md);color:#1e40af}
.hint.warning{background:var(--amber-lt);border:1px solid #fde68a;color:#92400e}
.hint.success{background:var(--green-lt);border:1px solid #bbf7d0;color:#14532d}
.hint.danger{background:var(--red-lt);border:1px solid #fecaca;color:#991b1b}

/* table */
.doc-table-wrap{overflow-x:auto;margin-bottom:16px;border-radius:var(--radius-sm);border:1px solid var(--border)}
.doc-table{width:100%;border-collapse:collapse;font-size:13px}
.doc-table th{background:var(--bg2);padding:10px 14px;text-align:left;font-weight:600;color:var(--text);border-bottom:1px solid var(--border);white-space:nowrap}
.doc-table td{padding:9px 14px;border-bottom:1px solid var(--border);color:var(--text2);line-height:1.5}
.doc-table tr:last-child td{border-bottom:none}
.doc-table tr:hover td{background:var(--bg2)}

/* code */
.doc-code{font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:12px;overflow-x:auto;color:#1e293b;line-height:1.6}
.ic{font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--bg3);padding:1px 5px;border-radius:3px;color:var(--blue)}

/* section divider */
.doc-divider{height:1px;background:var(--border);margin:24px 0}

/* cards grid (funcionalidades overview) */
.doc-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:20px}
.doc-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;text-decoration:none;color:inherit;transition:all .15s;display:flex;flex-direction:column;gap:6px;cursor:pointer
}
.doc-card:hover{border-color:var(--blue);background:var(--blue-lt);box-shadow:var(--shadow)}
.doc-card-icon{font-size:20px}
.doc-card-title{font-size:13px;font-weight:700;color:var(--text)}
.doc-card-desc{font-size:12px;color:var(--text3);line-height:1.5}

/* lightbox */
.lightbox{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);align-items:center;justify-content:center;flex-direction:column;gap:10px}
.lightbox.open{display:flex}
.lightbox img{max-width:90vw;max-height:82vh;border-radius:var(--radius);box-shadow:0 24px 48px rgba(0,0,0,.4);object-fit:contain}
.lb-label{font-size:12px;color:rgba(255,255,255,.5)}
.lb-close{position:fixed;top:16px;right:20px;width:34px;height:34px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:50%;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.lb-close:hover{background:rgba(255,255,255,.2)}
.img-frame{display:inline-flex;flex-direction:column;gap:5px;cursor:zoom-in;transition:transform .15s}
.img-frame:hover{transform:translateY(-2px)}
.img-frame img{border-radius:var(--radius-sm);border:1px solid var(--border);max-height:160px;max-width:100%;object-fit:contain;background:var(--bg2)}
.img-label{font-size:11px;color:var(--text3);text-align:center}
.fc-images{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <a href="index.html" class="topbar-home">← Portal</a>
  <div class="topbar-sep"></div>
  <a class="topbar-logo" href="#">Amigo <em>Flow</em></a>
  <span class="topbar-product">Docs & Releases</span>
  <div class="topbar-tabs">
    <button class="tab-btn active" onclick="switchTab('releases')" id="tab-releases">📦 Releases</button>
    <button class="tab-btn" onclick="switchTab('docs')" id="tab-docs">📚 Documentação</button>
  </div>
</header>

<!-- LAYOUT -->
<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div id="sidebar-releases-header" class="sidebar-header">
      <div class="sidebar-label">Versões</div>
    </div>
    <div id="sidebar-docs-header" class="sidebar-header" style="display:none">
      <div class="sidebar-label">Navegação</div>
      <div class="sidebar-search">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Buscar..." id="doc-search" oninput="filterDocs(this.value)"/>
      </div>
    </div>
    <div class="sidebar-list" id="sidebar-list"></div>
  </aside>

  <main class="main" id="main-content">
    <div class="empty-state">
      <div class="empty-icon">👈</div>
      <h3>Selecione uma release</h3>
      <p>Escolha uma versão na barra lateral para ver as novidades.</p>
    </div>
  </main>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="lbClickOutside(event)">
  <button class="lb-close" onclick="closeLb()">✕</button>
  <img id="lb-img" src="" alt=""/>
  <div class="lb-label" id="lb-label"></div>
</div>

<script>
// ─────────────────────────────────────────────
// RELEASES DATA
// ─────────────────────────────────────────────
const releases = [
  {
    year:2026, id:'d21', name:'Delivery 21', releaseDate:'2026-06-19', released:false,
    desc:'Automação de conversas inativas.',
    features:[{
      title:'Finalização automática para conversas "Em aguardo"', jiraKey:'GREEN-3015',
      contexto:'Conversas marcadas como "Em aguardo" ficavam abertas indefinidamente, acumulando chats parados e poluindo a fila de atendimento.',
      feito:'Implementada regra de finalização automática: conversas que permaneçam em "Em aguardo" por um período configurável são encerradas automaticamente.',
      impacto:'Reduz o acúmulo de conversas abandonadas, mantém a fila limpa e permite à equipe focar nos atendimentos realmente ativos.'
    }]
  },
  {
    year:2026, id:'d20', name:'Delivery 20', releaseDate:'2026-06-05', released:false,
    desc:'IA no atendimento, envios automáticos completos, notas internas, orientações para o agente e melhorias na criação de contatos.',
    features:[
      {title:'Sugestão de Resposta com IA no Chat',jiraKey:'GREEN-3180',contexto:'Atendentes elaboravam cada resposta manualmente, tornando o atendimento mais lento e inconsistente.',feito:'IA analisa o contexto da conversa e propõe respostas que o atendente pode usar ou adaptar diretamente no chat.',impacto:'Acelera o tempo médio de resposta e padroniza a qualidade das mensagens enviadas.'},
      {title:'Notas internas de atendimento',jiraKey:'GREEN-3023',contexto:'Não havia forma de registrar informações internas sobre um atendimento sem que o paciente visse.',feito:'Notas visíveis somente para a equipe interna, criadas durante e após o atendimento.',impacto:'Melhora o contexto para transferências e elimina uso de ferramentas paralelas para comunicação interna.'},
      {title:'Menções em notas internas',jiraKey:'GREEN-3025',contexto:'Notas internas não permitiam notificar um colega específico.',feito:'Suporte a menções (@) em notas internas para chamar um colega diretamente.',impacto:'Comunicação interna dentro do próprio Flow, sem necessidade de abrir Slack ou WhatsApp.'},
      {title:'Agente cria notas com motivo da transferência',jiraKey:'GREEN-3013',contexto:'Quando o agente transferia, o destinatário não tinha contexto sobre o motivo.',feito:'O agente registra automaticamente uma nota interna com o motivo da transferência.',impacto:'Reduz o tempo de onboarding de quem recebe o chat e melhora a qualidade do handoff.'},
      {title:'Criar contato sem vinculá-lo como Lead',jiraKey:'GREEN-3017',contexto:'Ao iniciar conversa com número desconhecido, o sistema obrigava criação de lead.',feito:'Opção para criar contato sem vinculá-lo automaticamente como lead.',impacto:'Base de leads limpa e representativa, sem misturar contatos operacionais.'},
      {title:'Orientações para o Agente – Importação',jiraKey:'GREEN-2757',contexto:'Orientações precisavam ser inseridas manualmente, sem importação em massa.',feito:'Importação de orientações para o agente via arquivo estruturado.',impacto:'Acelera configuração inicial e atualização da base de conhecimento da IA.'},
      {title:'Base de orientações para o Agente',jiraKey:'GREEN-1968',contexto:'O agente não tinha onde buscar respostas específicas da clínica, respondendo de forma genérica.',feito:'Área onde a clínica cadastra perguntas/respostas e instruções que o agente consulta durante atendimentos.',impacto:'O agente responde com precisão as políticas e procedimentos de cada clínica.'},
      {title:'Envio automático de Aniversário',jiraKey:'GREEN-2503',contexto:'Clínicas não tinham forma automatizada de enviar mensagens de aniversário.',feito:'Template disparado automaticamente no dia do aniversário do paciente.',impacto:'Fidelização automatizada sem esforço operacional.'},
      {title:'Envio automático de Pós-Atendimento',jiraKey:'GREEN-2501',contexto:'Após a consulta, clínicas precisavam manualmente fazer o seguimento.',feito:'Disparado automaticamente após finalização do atendimento com intervalo configurável.',impacto:'Garante continuidade no cuidado e aumenta coleta de feedbacks.'},
      {title:'Envio automático de Pré-Atendimento',jiraKey:'GREEN-2447',contexto:'Lembretes pré-consulta eram manuais ou inexistentes, aumentando no-show.',feito:'Mensagem disparada dias ou horas antes da consulta agendada.',impacto:'Reduz no-show e prepara o paciente para a consulta.'},
      {title:'Envio automático de Orçamento em aberto',jiraKey:'GREEN-2449',contexto:'Orçamentos não respondidos ficavam sem acompanhamento.',feito:'Sistema identifica orçamentos sem resposta e dispara follow-up automaticamente.',impacto:'Aumenta taxa de conversão de orçamentos.'},
      {title:'Parametrizar inatividade em Envios em massa',jiraKey:'GREEN-2853',contexto:'Regra de inatividade era global e não podia ser personalizada por campanha.',feito:'Parâmetro de inatividade configurável por envio em massa.',impacto:'Estratégias de disparo mais precisas por tipo de campanha.'},
      {title:'Agente acessa informações profissionais',jiraKey:'GREEN-2783',contexto:'O agente não acessava especialidade, CRM etc. dos profissionais cadastrados.',feito:'Agente pode acessar "Informações Profissionais" do cadastro durante atendimentos.',impacto:'Respostas mais completas sobre profissionais disponíveis na clínica.'},
    ]
  },
  {
    year:2026, id:'d19', name:'Delivery 19', releaseDate:'2026-05-22', released:true,

// TABS
// ─────────────────────────────────────────────
let currentTab = 'releases';

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-releases').classList.toggle('active', tab==='releases');
  document.getElementById('tab-docs').classList.toggle('active', tab==='docs');
  document.getElementById('sidebar-releases-header').style.display = tab==='releases' ? '' : 'none';
  document.getElementById('sidebar-docs-header').style.display = tab==='docs' ? '' : 'none';
  buildSidebar();
  const main = document.getElementById('main-content');
  main.innerHTML = `<div class="empty-state">
    <div class="empty-icon">${tab==='releases'?'👈':'📖'}</div>
    <h3>Selecione ${tab==='releases'?'uma release':'um tópico'}</h3>
    <p>${tab==='releases'?'Escolha uma versão na barra lateral para ver as novidades.':'Navegue pela documentação completa do Amigo Flow.'}</p>
  </div>`;
}

// ─────────────────────────────────────────────
// SIDEBAR
// ─────────────────────────────────────────────
function buildSidebar() {
  const list = document.getElementById('sidebar-list');
  list.innerHTML = '';
  if (currentTab==='releases') buildReleasesSidebar(list);
  else buildDocsSidebar(list);
}

function fmtDate(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-').map(Number);
  const mo=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return `${day} ${mo[m-1]} ${y}`;
}

function buildReleasesSidebar(list) {
  let lastYear = null;
  releases.forEach(r => {
    if (r.year !== lastYear) {
      lastYear = r.year;
      const yg = document.createElement('div');
      yg.className = 'year-group';
      const yl = document.createElement('div');
      yl.className = 'year-label';
      yl.textContent = r.year;
      yg.appendChild(yl);
      list.appendChild(yg);
    }
    const btn = document.createElement('button');
    btn.className = 'release-btn';
    btn.dataset.id = r.id;
    btn.innerHTML = `
      <div class="rb-name">${r.name}</div>
      <div class="rb-date">${fmtDate(r.releaseDate)}</div>
      <div class="rb-pill ${r.released?'released':'upcoming'}">${r.released?'Lançada':'Em breve'}</div>
    `;
    btn.onclick = () => showRelease(r.id);
    list.appendChild(btn);
  });
}

function buildDocsSidebar(list, filter='') {
  const fl = filter.toLowerCase();
  docsTree.forEach(item => {
    if (item.section) {
      const sec = document.createElement('div');
      sec.className = 'doc-section';
      const title = document.createElement('div');
      title.className = 'doc-section-title';
      title.innerHTML = `<span class="si">${item.icon}</span>${item.section}`;
      sec.appendChild(title);
      item.items.forEach(it => {
        if (fl && !it.label.toLowerCase().includes(fl)) return;
        const btn = document.createElement('button');
        btn.className = 'doc-item';
        btn.dataset.id = it.id;
        btn.textContent = (it.icon?it.icon+' ':'')+it.label;
        btn.onclick = () => showDoc(it.id);
        sec.appendChild(btn);
        if (it.children) {
          it.children.forEach(ch => {
            if (fl && !ch.label.toLowerCase().includes(fl)) return;
            const cb = document.createElement('button');
            cb.className = 'doc-sub-item';
            cb.dataset.id = ch.id;
            cb.textContent = ch.label;
            cb.onclick = () => showDoc(ch.id);
            sec.appendChild(cb);
          });
        }
      });
      list.appendChild(sec);
    } else {
      if (fl && !item.label.toLowerCase().includes(fl)) return;
      const btn = document.createElement('button');
      btn.className = 'doc-item';
      btn.dataset.id = item.id;
      btn.textContent = (item.icon?item.icon+' ':'')+item.label;
      btn.onclick = () => showDoc(item.id);
      list.appendChild(btn);
    }
  });
}

function filterDocs(val) {
  const list = document.getElementById('sidebar-list');
  list.innerHTML = '';
  buildDocsSidebar(list, val);
}

      <div class="fc-rows">

          <div class="fc-body"><div class="fc-label">Impacto</div><div class="fc-text">${f.impacto}</div></div>

}

function setActiveDoc(id) {
  document.querySelectorAll('.doc-item,.doc-sub-item').forEach(b=>b.classList.toggle('active',b.dataset.id===id));
}

function hint(type, icon, html) {
  return `<div class="hint ${type}"><div class="hint-icon">${icon}</div><div class="hint-body">${html}</div></div>`;
}
function h2(t){return `<h2 class="doc-h2">${t}</h2>`}
function h3(t){return `<h3 class="doc-h3">${t}</h3>`}
function p(t){return `<p class="doc-p">${t}</p>`}
function ul(items){return `<ul class="doc-ul">${items.map(i=>`<li>${i}</li>`).join('')}</ul>`}
function ol(items){return `<ol class="doc-ol">${items.map(i=>`<li>${i}</li>`).join('')}</ol>`}
function divider(){return `<div class="doc-divider"></div>`}
function table(heads,rows){
  return `<div class="doc-table-wrap"><table class="doc-table"><thead><tr>${heads.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
}
function code(t){return `<pre class="doc-code">${t}</pre>`}
function ic(t){return `<span class="ic">${t}</span>`}

function docPage(id, icon, title, subtitle, body) {
  return `<div class="doc-page">
    <div class="doc-breadcrumb">
      <a href="#" onclick="showDoc('welcome')">Amigo Flow</a>
      <span>›</span><span>${title}</span>
    </div>
    <div class="doc-h1"><span class="dicon">${icon}</span>${title}</div>
    ${subtitle?`<p class="doc-subtitle">${subtitle}</p>`:''}
    ${body}
  </div>`;
}

function showDoc(id) {
  setActiveDoc(id);
  const render = docContent[id];
  if (!render) {
    document.getElementById('main-content').innerHTML = `<div class="empty-state"><div class="empty-icon">🚧</div><h3>Em breve</h3><p>Esta página da documentação está sendo elaborada.</p></div>`;
    return;
  }
  document.getElementById('main-content').innerHTML = render();
  document.getElementById('main-content').scrollTop = 0;
}

// ─────────────────────────────────────────────
function openLb(src,label){
  document.getElementById('lb-img').src=src;
  document.getElementById('lb-label').textContent=label;
  document.getElementById('lightbox').classList.add('open');
}
function closeLb(){document.getElementById('lightbox').classList.remove('open')}
function lbClickOutside(e){if(e.target===document.getElementById('lightbox'))closeLb()}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLb()});

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
buildSidebar();
if (releases.length) showRelease(releases[0].id);

const params = new URLSearchParams(location.search);
if (params.get('tab')==='docs') { switchTab('docs'); if (params.get('doc')) showDoc(params.get('doc')); }
else if (params.get('release')) showRelease(params.get('release'));
</script>
