<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amigo Flow – Release Notes</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --brand:      #008CFF;
    --brand-dark: #0070CC;
    --brand-50:   #E6F4FF;
    --brand-100:  #CCE9FF;
    --bg:         #F8F9FA;
    --surface:    #FFFFFF;
    --sidebar-bg: #0F172A;
    --sidebar-2:  #1E293B;
    --border:     #E9ECEF;
    --text:       #0F172A;
    --text-2:     #334155;
    --text-3:     #64748B;
    --success:    #22C55E;
    --success-bg: #DCFCE7;
    --warning:    #F59E0B;
    --warning-bg: #FEF3C7;
    --purple:     #8B5CF6;
    --purple-bg:  #EDE9FE;
    --radius:     12px;
    --radius-sm:  8px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{font-family:'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;background:var(--bg);color:var(--text);display:flex}

  /* ── SIDEBAR ── */
  .sidebar{width:280px;flex-shrink:0;background:var(--sidebar-bg);display:flex;flex-direction:column;height:100vh;position:relative;z-index:10}
  .sidebar-header{padding:24px 20px 16px;border-bottom:1px solid rgba(255,255,255,.06)}
  .sidebar-back{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:rgba(255,255,255,.35);text-decoration:none;letter-spacing:.3px;margin-bottom:14px;transition:color .15s}
  .sidebar-back:hover{color:rgba(255,255,255,.7)}
  .sidebar-logo{display:flex;align-items:center;gap:10px;margin-bottom:4px}
  .logo-icon{width:32px;height:32px;background:var(--brand);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .logo-name{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.3px}
  .logo-sub{font-size:10px;color:rgba(255,255,255,.3);font-weight:600;letter-spacing:2px;text-transform:uppercase;padding-left:42px}
  .sidebar-search{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.06)}
  .search-wrap{position:relative}
  .search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.3)}
  .search-input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:7px 10px 7px 32px;font-size:12px;color:#fff;outline:none;font-family:inherit;transition:border-color .2s}
  .search-input::placeholder{color:rgba(255,255,255,.3)}
  .search-input:focus{border-color:var(--brand)}
  .sidebar-list{flex:1;overflow-y:auto;padding:8px 0 16px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent}
  .sidebar-list::-webkit-scrollbar{width:4px}
  .sidebar-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
  .year-group{margin-bottom:4px}
  .year-label{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.25);padding:12px 20px 6px}
  .release-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;border-left:3px solid transparent;transition:all .15s;position:relative}
  .release-item:hover{background:rgba(255,255,255,.04)}
  .release-item.active{background:rgba(0,140,255,.12);border-left-color:var(--brand)}
  .release-item.active .ri-version{color:var(--brand)}
  .ri-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .ri-dot.released{background:var(--success)}
  .ri-dot.upcoming{border:2px solid #fbbf24;background:transparent}
  .ri-info{flex:1;min-width:0}
  .ri-version{font-size:13px;font-weight:600;color:rgba(255,255,255,.85);letter-spacing:-.2px}
  .ri-date{font-size:11px;color:rgba(255,255,255,.3);margin-top:1px}
  .ri-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.5px;text-transform:uppercase;flex-shrink:0}
  .badge-released{background:rgba(34,197,94,.15);color:#4ade80}
  .badge-upcoming{background:rgba(245,158,11,.15);color:#fbbf24}
  .sidebar-footer{padding:12px 20px;border-top:1px solid rgba(255,255,255,.06);font-size:11px;color:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:space-between}
  .total-badge{background:rgba(0,140,255,.2);color:var(--brand);font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
  .upcoming-section{margin-bottom:4px}
  .upcoming-toggle{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;cursor:pointer;user-select:none;transition:background .15s}
  .upcoming-toggle:hover{background:rgba(255,255,255,.04)}
  .upcoming-toggle-label{display:flex;align-items:center;gap:7px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.35)}
  .upcoming-toggle-dot{width:7px;height:7px;border-radius:50%;border:2px solid #fbbf24;flex-shrink:0}
  .upcoming-toggle svg{transition:transform .2s;color:rgba(255,255,255,.25)}
  .upcoming-toggle.open svg{transform:rotate(180deg)}
  .upcoming-items{overflow:hidden}
  .upcoming-items.collapsed{display:none}
  .no-result{padding:20px;font-size:12px;color:rgba(255,255,255,.25);text-align:center}

  /* ── MAIN ── */
  .main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
  .main::-webkit-scrollbar{width:5px}
  .main::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

  /* topbar */
  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 40px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:5}
  .topbar-left{display:flex;align-items:center;gap:10px}
  .topbar-version{font-size:14px;font-weight:700;color:var(--text);letter-spacing:-.3px}
  .topbar-sep{color:var(--border);font-size:16px}
  .topbar-date{font-size:13px;color:var(--text-3)}
  .status-pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.3px}
  .pill-released{background:var(--success-bg);color:#16a34a}
  .pill-upcoming{background:var(--warning-bg);color:#d97706}
  .topbar-nav{display:flex;align-items:center;gap:6px}
  .nav-btn{width:32px;height:32px;border-radius:8px;background:rgba(15,23,42,.05);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-3);font-size:14px;transition:all .15s}
  .nav-btn:hover:not(:disabled){background:var(--brand-50);color:var(--brand)}
  .nav-btn:disabled{opacity:.3;cursor:default}

  /* content */
  .content{padding:40px 40px 60px;max-width:960px}

  /* hero */
  .release-hero{margin-bottom:32px}
  .hero-kicker{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--brand);margin-bottom:10px;opacity:0;transform:translateY(12px);transition:all .4s ease .05s}
  .hero-title{font-size:44px;font-weight:800;color:var(--text);letter-spacing:-1.5px;line-height:1.1;margin-bottom:12px;opacity:0;transform:translateY(12px);transition:all .4s ease .12s}
  .hero-date-row{display:flex;align-items:center;gap:10px;opacity:0;transform:translateY(12px);transition:all .4s ease .18s}
  .hero-date{font-size:15px;color:var(--text-3)}

  /* desc */
  .release-desc-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px 28px;margin-bottom:28px;opacity:0;transform:translateY(12px);transition:all .4s ease .22s}
  .block-label{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--text-3);margin-bottom:12px}
  .desc-text{font-size:15px;color:var(--text-2);line-height:1.7}

  /* feature tags */
  .features-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px;opacity:0;transform:translateY(12px);transition:all .4s ease .28s}
  .ftag{font-size:11px;font-weight:700;padding:4px 11px;border-radius:6px;background:var(--brand-50);color:var(--brand-dark);border:1px solid var(--brand-100);letter-spacing:.2px}

  /* accordion features */
  .features-list{display:flex;flex-direction:column;gap:10px;margin-bottom:32px;opacity:0;transform:translateY(12px);transition:all .4s ease .30s}
  .feat-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;transition:box-shadow .15s,border-color .15s}
  .feat-item:hover{box-shadow:0 4px 16px rgba(0,140,255,.08);border-color:var(--brand-100)}
  .feat-item.open{border-color:var(--brand);box-shadow:0 4px 20px rgba(0,140,255,.14)}
  .feat-header{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;cursor:pointer;user-select:none;transition:background .1s}
  .feat-header:hover{background:rgba(0,140,255,.02)}
  .feat-num{width:22px;height:22px;background:var(--brand-50);color:var(--brand-dark);border-radius:6px;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
  .feat-item.open .feat-num{background:var(--brand);color:#fff}
  .feat-title-wrap{flex:1;display:flex;flex-direction:column;gap:5px}
  .feat-text{font-size:14px;color:var(--text-2);line-height:1.5;font-weight:500}
  .feat-item.open .feat-text{color:var(--text)}
  .feat-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .feat-status{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.3px;text-transform:uppercase}
  .feat-status.done   {background:var(--success-bg);color:#16a34a}
  .feat-status.progress{background:var(--brand-50);color:var(--brand-dark)}
  .feat-status.planned{background:var(--warning-bg);color:#d97706}
  .feat-status.review {background:var(--purple-bg);color:var(--purple)}
  .feat-status::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}
  .feat-jira-chip{font-size:10px;font-weight:600;color:var(--text-3);background:var(--bg);border:1px solid var(--border);padding:2px 7px;border-radius:4px;font-family:monospace;letter-spacing:.3px}
  .feat-chevron{flex-shrink:0;margin-top:3px;color:var(--text-3);transition:transform .25s ease,color .15s}
  .feat-item.open .feat-chevron{transform:rotate(180deg);color:var(--brand)}
  .feat-body{max-height:0;overflow:hidden;transition:max-height .38s ease;border-top:0px solid var(--border)}
  .feat-item.open .feat-body{max-height:900px;border-top-width:1px}
  .feat-body-inner{padding:16px 20px 16px 50px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
  .feat-section-label{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--brand);margin-bottom:5px}
  .feat-section-text{font-size:13px;color:var(--text-2);line-height:1.65}
  .feat-jira-link{display:inline-flex;align-items:center;gap:4px;margin-top:6px;font-size:11px;color:var(--brand);text-decoration:none;font-weight:600;opacity:.7;transition:opacity .15s}
  .feat-jira-link:hover{opacity:1}

  /* empty */
  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 40px;color:var(--text-3);text-align:center;gap:12px;height:100%}
  .empty-icon{font-size:40px}
  .empty-title{font-size:18px;font-weight:700;color:var(--text-2)}
  .empty-sub{font-size:14px}

  /* anims */
  .anim-in .hero-kicker,.anim-in .hero-title,.anim-in .hero-date-row,
  .anim-in .release-desc-block,.anim-in .features-row,
  .anim-in .features-list,.anim-in .release-empty-plan{opacity:1;transform:translateY(0)}

  /* ── RICH FEATURE (D20) ── */
  .rich-feat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;transition:box-shadow .15s,border-color .15s;margin-bottom:12px}
  .rich-feat:hover{box-shadow:0 4px 16px rgba(0,140,255,.08);border-color:var(--brand-100)}
  .rich-feat.open{border-color:var(--brand);box-shadow:0 4px 20px rgba(0,140,255,.14)}
  .rich-feat-header{display:flex;align-items:flex-start;gap:12px;padding:16px;cursor:pointer;user-select:none;transition:background .1s}
  .rich-feat-header:hover{background:rgba(0,140,255,.02)}
  .rich-feat-num{width:24px;height:24px;border-radius:6px;background:var(--brand-50);color:var(--brand-dark);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
  .rich-feat.open .rich-feat-num{background:var(--brand);color:#fff}
  .rich-feat-title-col{flex:1;display:flex;flex-direction:column;gap:6px}
  .rich-feat-title{font-size:14px;font-weight:600;color:var(--text-2);line-height:1.4}
  .rich-feat.open .rich-feat-title{color:var(--text)}
  .rich-feat-chips{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .rich-feat-chevron{flex-shrink:0;margin-top:2px;color:var(--text-3);transition:transform .25s ease,color .15s}
  .rich-feat.open .rich-feat-chevron{transform:rotate(180deg);color:var(--brand)}
  .rich-feat-body{max-height:0;overflow:hidden;transition:max-height .4s ease;border-top:0 solid var(--border)}
  .rich-feat.open .rich-feat-body{max-height:2400px;border-top-width:1px}
  .rich-info-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;padding:18px 18px 18px 50px}
  .rich-info-label{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--brand);margin-bottom:5px}
  .rich-info-text{font-size:13px;color:var(--text-2);line-height:1.65}
  .rich-jira-link{display:inline-flex;align-items:center;gap:4px;margin-top:6px;font-size:11px;color:var(--brand);text-decoration:none;font-weight:600;opacity:.7;transition:opacity .15s}
  .rich-jira-link:hover{opacity:1}
  .rich-diagram{margin:0 18px 18px 50px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:20px;overflow-x:auto}
  .rich-diagram-title{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-3);margin-bottom:14px;display:flex;align-items:center;gap:6px}
  .rich-images{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin:0 18px 20px 50px}
  .rich-img-card{border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--surface);transition:box-shadow .15s,transform .15s}
  .rich-img-card:hover{box-shadow:0 6px 20px rgba(0,140,255,.12);transform:translateY(-2px)}
  .rich-img-bar{height:28px;background:#F1F5F9;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:5px}
  .rich-img-dot{width:8px;height:8px;border-radius:50%;opacity:.6}
  .rich-img-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-3);padding:8px 12px 6px}
  .rich-img-placeholder{height:180px;background:linear-gradient(135deg,#f8f9fa,#f1f5f9);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;transition:background .15s}
  .rich-img-placeholder:hover{background:var(--brand-50)}
  .rich-img-placeholder-icon{width:44px;height:44px;background:var(--brand-50);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
  .rich-img-placeholder-text{font-size:11px;color:var(--text-3);text-align:center;line-height:1.5}
  .rich-img-placeholder-sub{font-size:10px;color:var(--brand);font-weight:600;margin-top:2px}
  .rich-img-real{width:100%;display:block;object-fit:contain;max-height:260px;cursor:zoom-in}
  .rich-figma-btn{display:flex;align-items:center;justify-content:center;gap:5px;padding:7px;font-size:11px;font-weight:600;color:var(--brand);background:var(--brand-50);border-top:1px solid var(--brand-100);text-decoration:none;transition:background .15s}
  .rich-figma-btn:hover{background:var(--brand-100)}

  /* lightbox */
  .lb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(4px)}
  .lb-overlay.active{display:flex}
  .lb-inner{position:relative;max-width:92vw;max-height:90vh;border-radius:14px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.6)}
  .lb-inner img{display:block;max-width:92vw;max-height:90vh;object-fit:contain}
  .lb-close{position:absolute;top:10px;right:10px;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;border:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:background .15s}
  .lb-close:hover{background:rgba(0,0,0,.85)}
  .lb-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.5);color:#fff;font-size:12px;font-weight:600;text-align:center;padding:8px 12px}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-header">
    <a href="index.html" class="sidebar-back">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
      Portal Amigo
    </a>
    <div class="sidebar-logo">
      <div class="logo-icon">🌊</div>
      <span class="logo-name">Amigo Flow</span>
    </div>
    <div class="logo-sub">Release Notes</div>
  </div>

  <div class="sidebar-search">
    <div class="search-wrap">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-input" type="text" placeholder="Buscar delivery…" id="searchInput" oninput="filterReleases(this.value)">
    </div>
  </div>

  <nav class="sidebar-list" id="sidebarList"></nav>

  <div class="sidebar-footer">
    <span>Amigo Flow · GREEN</span>
    <span class="total-badge" id="totalBadge"></span>
  </div>
</aside>

<!-- MAIN -->
<main class="main" id="mainContent">
  <div class="empty-state">
    <div class="empty-icon">👈</div>
    <div class="empty-title">Selecione uma release</div>
    <div class="empty-sub">Escolha uma versão na barra lateral para ver as novidades.</div>
  </div>
</main>

<!-- LIGHTBOX -->
<div class="lb-overlay" id="lbOverlay" onclick="lbOutside(event)">
  <div class="lb-inner">
    <img id="lbImg" src="" alt="">
    <div class="lb-label" id="lbLabel"></div>
    <button class="lb-close" onclick="closeLb()">✕</button>
  </div>
</div>

<script>
// ─── STATUS MAP ──────────────────────────────────────────────────────────────
// status → { label, cls }
// cls: done | progress | planned | review
const STATUS = {
  'Released':           { label:'Concluída',    cls:'done'     },
  'Ready to Deploy':    { label:'Concluída',    cls:'done'     },
  'Done':               { label:'Concluída',    cls:'done'     },
  'Ready to Test':      { label:'Em revisão',   cls:'review'   },
  'Revisar':            { label:'Em revisão',   cls:'review'   },
  'Em andamento':       { label:'Em andamento', cls:'progress' },
  'In Progress':        { label:'Em andamento', cls:'progress' },
  'Backlog Downstream': { label:'Planejada',    cls:'planned'  },
  'Backlog Upstream':   { label:'Planejada',    cls:'planned'  },
  'Ready to Development':{ label:'Planejada',   cls:'planned'  },
  'Discarded':          { label:'Descartada',   cls:'planned'  },
};

function statusBadge(s) {
  if (!s) return '';
  const m = STATUS[s] || { label: s, cls:'planned' };
  return `<span class="feat-status ${m.cls}">${m.label}</span>`;
}

// ─── DATA ────────────────────────────────────────────────────────────────────
// Atualizado automaticamente em 19/06/2026 12:28 UTC
const releases = [
  {
    year:2026, id:'delivery-23', name:'Delivery 23', releaseDate:'2026-07-17', released:false,
    desc:'Agente poder agendar atendimentos do tipo retorno, Agente de IA: categorizar atendimentos por temas configurados via banco de dados',
    features:[
      {title:'Agente poder agendar atendimentos do tipo retorno',jiraKey:'GREEN-2579',status:'Backlog Upstream',contexto:'',feito:'',impacto:''},
      {title:'Agente de IA: categorizar atendimentos por temas configurados via banco de dados',jiraKey:'GREEN-3356',status:'Backlog Upstream',contexto:'',feito:'',impacto:''}
    ]
  },
  {
    year:2026, id:'delivery-22', name:'Delivery 22', releaseDate:'2026-07-03', released:false,
    desc:'Contexto de IA sobre o lead, No modal do Kanban de Envios, oferecer tanto envios ativos quanto inativos pra o usuario escolher qual deseja enviar, Gestão de leads, Perfil do lead (Informações, interesses, etiquetas e origem)',
    features:[
      {title:'Perfil do lead (Informações, interesses, etiquetas e origem)',jiraKey:'GREEN-2961',status:'Revisar',contexto:'',feito:'',impacto:''},

// ─── UTILS ───────────────────────────────────────────────────────────────────
const MO = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
function fmt(s) {
  if (!s) return '—';
  const d = new Date(s + 'T12:00:00Z');
  return `${d.getUTCDate()} ${MO[d.getUTCMonth()]} ${d.getUTCFullYear()}`;
}

// ─── SIDEBAR ─────────────────────────────────────────────────────────────────
let currentId = null;
let filteredList = [...releases];

function buildReleaseItem(r) {
  const el = document.createElement('div');
  el.className = 'release-item' + (currentId === r.id ? ' active' : '');
  el.dataset.id = r.id;
  el.innerHTML = `
    <div class="ri-dot ${r.released ? 'released' : 'upcoming'}"></div>
    <div class="ri-info">
      <div class="ri-version">${r.name}</div>
      <div class="ri-date">${fmt(r.releaseDate)}</div>
    </div>
    <span class="ri-badge ${r.released ? 'badge-released' : 'badge-upcoming'}">${r.released ? 'Live' : 'Soon'}</span>`;
  el.addEventListener('click', () => selectRelease(r.id));
  return el;
}

function buildSidebar(list) {
  const nav = document.getElementById('sidebarList');
  nav.innerHTML = '';
  if (!list.length) {
    nav.innerHTML = '<div class="no-result">Nenhuma release encontrada</div>';
    document.getElementById('totalBadge').textContent = '0 releases';
    return;
  }
  const upcoming = list.filter(r => !r.released);
  const released = list.filter(r => r.released);
  if (upcoming.length) {
    const sec = document.createElement('div');
    sec.className = 'upcoming-section';
    const tog = document.createElement('div');
    tog.className = 'upcoming-toggle';
    tog.innerHTML = `<span class="upcoming-toggle-label"><span class="upcoming-toggle-dot"></span>Próximas (${upcoming.length})</span>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg>`;
    const items = document.createElement('div');
    items.className = 'upcoming-items collapsed';
    upcoming.forEach(r => items.appendChild(buildReleaseItem(r)));
    tog.addEventListener('click', () => {
      const open = tog.classList.contains('open');
      tog.classList.toggle('open', !open);
      items.classList.toggle('collapsed', open);
    });
    sec.appendChild(tog);
    sec.appendChild(items);
    nav.appendChild(sec);
  }
  const years = [...new Set(released.map(r => r.year))].sort((a,b) => b-a);
  years.forEach(y => {
    const g = document.createElement('div');
    g.className = 'year-group';
    g.innerHTML = `<div class="year-label">${y}</div>`;
    released.filter(r => r.year === y).forEach(r => g.appendChild(buildReleaseItem(r)));
    nav.appendChild(g);
  });
  document.getElementById('totalBadge').textContent = `${list.length} releases`;
}

function filterReleases(q) {
  q = q.toLowerCase();
  filteredList = q ? releases.filter(r =>
    r.name.toLowerCase().includes(q) ||
    r.desc.toLowerCase().includes(q) ||
    r.features.some(f => f.title.toLowerCase().includes(q))
  ) : [...releases];
  buildSidebar(filteredList);
}

                <div class="feat-section-label">${r.released ? 'O que foi feito' : 'O que será feito'}</div>
                <div class="feat-section-text">${f.feito || '—'}</div>
              </div>
              <div>
                <div class="feat-section-label">Impacto esperado</div>

      <div style="font-size:13px;color:var(--text-3);line-height:1.6">As funcionalidades desta release ainda não foram definidas.</div>
    </div>`;

  document.getElementById('mainContent').innerHTML = `
    <div class="topbar">
      <div class="topbar-left">
        <span class="topbar-version">${r.name}</span>
        <span class="topbar-sep">·</span>
        <span class="topbar-date">${fmt(r.releaseDate)}</span>
        <span class="status-pill ${r.released ? 'pill-released' : 'pill-upcoming'}">${r.released ? '✓ Lançada' : '⏳ Próxima'}</span>
      </div>
      <div class="topbar-nav">
        <button class="nav-btn" onclick="selectRelease('${allIds[idx+1]||''}')" ${idx>=allIds.length-1?'disabled':''} title="Anterior">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <button class="nav-btn" onclick="selectRelease('${allIds[idx-1]||''}')" ${idx<=0?'disabled':''} title="Próxima">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>
        </button>
      </div>

    <div class="content" id="ci">
      <div class="release-hero">
        <div class="hero-kicker">Release Notes · Amigo Flow</div>
        <div class="hero-title">${r.name}</div>

      ${featsHtml}
    </div>`;

  requestAnimationFrame(() => requestAnimationFrame(() => {
    document.getElementById('mainContent').scrollTo(0,0);
    document.getElementById('mainContent').classList.add('anim-in');
  }));
}

function toggleFeat(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const wasOpen = el.classList.contains('open');
  document.querySelectorAll('.feat-item.open').forEach(x => { if (x.id!==id) x.classList.remove('open'); });
  el.classList.toggle('open', !wasOpen);
}

}
function closeLb() { document.getElementById('lbOverlay').classList.remove('active'); }
function lbOutside(e) { if (e.target===document.getElementById('lbOverlay')) closeLb(); }
document.addEventListener('keydown', e => { if (e.key==='Escape') closeLb(); });

// ─── RENDER RICH FEATURE ─────────────────────────────────────────────────────
function buildImageCard(img, idx) {
  const cardId = `imgcard-${idx}-${Math.random().toString(36).slice(2,7)}`;
  return `
    <div class="rich-img-card" id="${cardId}">
      <div class="rich-img-bar">
        <div class="rich-img-dot" style="background:#FF6B6B"></div>
        <div class="rich-img-dot" style="background:#F5C542"></div>
        <div class="rich-img-dot" style="background:#40C057"></div>
      </div>
      <div class="rich-img-label">${img.label}</div>
      <div id="${cardId}-body">
        <img
          src="${img.src}"
          alt="${img.label}"
          class="rich-img-real"
          onclick="openLb('${img.src}','${img.label}')"
          onerror="showImgPlaceholder('${cardId}-body','${img.src}')"
          loading="lazy"
        />
      </div>
      ${img.figma ? `<a class="rich-figma-btn" href="${img.figma}" target="_blank">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 5.5A3.5 3.5 0 0 1 8.5 2H12v7H8.5A3.5 3.5 0 0 1 5 5.5z"/><path d="M12 2h3.5a3.5 3.5 0 1 1 0 7H12V2z"/><path d="M12 12.5a3.5 3.5 0 1 1 7 0 3.5 3.5 0 1 1-7 0z"/><path d="M5 19.5A3.5 3.5 0 0 1 8.5 16H12v3.5a3.5 3.5 0 1 1-7 0z"/><path d="M5 12.5A3.5 3.5 0 0 1 8.5 9H12v7H8.5A3.5 3.5 0 0 1 5 12.5z"/></svg>
        Ver no Figma
      </a>` : ''}
    </div>`;
}

function showImgPlaceholder(bodyId, src) {
  const el = document.getElementById(bodyId);
  if (!el) return;
  el.innerHTML = `
    <div class="rich-img-placeholder" onclick="triggerImgUploadHint('${src}')">
      <div class="rich-img-placeholder-icon">🖼️</div>
      <div class="rich-img-placeholder-text">
        Imagem não encontrada
        <span class="rich-img-placeholder-sub">${src}</span>
      </div>
    </div>`;
}

function renderRichFeat(f, i, r) {
  const JIRA = 'https://amigotech-team.atlassian.net/browse/';
  const id = `rf-${r.id}-${i}`;
  const diagramHtml = f.diagram && DIAGRAMS[f.diagram]
    ? `<div class="rich-diagram">${DIAGRAMS[f.diagram]}</div>` : '';
  const imagesHtml = f.images && f.images.length
    ? `<div class="rich-images">${f.images.map((img,idx) => buildImageCard(img,idx)).join('')}</div>` : '';

  return `
    <div class="rich-feat" id="${id}">
      <div class="rich-feat-header" onclick="toggleRich('${id}')">
        <div class="rich-feat-num">${i+1}</div>
        <div class="rich-feat-title-col">
          <div class="rich-feat-title">${f.title}</div>
          <div class="rich-feat-chips">
            ${statusBadge(f.status)}
            ${f.jiraKey ? `<span class="feat-jira-chip">${f.jiraKey}</span>` : ''}
            ${f.diagram ? `<span style="font-size:10px;color:var(--text-3);display:flex;align-items:center;gap:3px"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>Diagrama</span>` : ''}
            ${f.images && f.images.length ? `<span style="font-size:10px;color:var(--text-3);display:flex;align-items:center;gap:3px"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>${f.images.length} imagem${f.images.length>1?'s':''}</span>` : ''}
          </div>
        </div>
        <svg class="rich-feat-chevron" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg>
      </div>
      <div class="rich-feat-body">
        <div class="rich-info-grid">
          <div>
            <div class="rich-info-label">Contexto</div>
            <div class="rich-info-text">${f.contexto}</div>
          </div>
          <div>
            <div class="rich-info-label">${r.released ? 'O que foi feito' : 'O que será feito'}</div>
            <div class="rich-info-text">${f.feito}</div>
          </div>
          <div>
            <div class="rich-info-label">Impacto esperado</div>
            <div class="rich-info-text">${f.impacto}</div>
            ${f.jiraKey ? `<a class="rich-jira-link" href="${JIRA}${f.jiraKey}" target="_blank">↗ ${f.jiraKey}</a>` : ''}
          </div>
        </div>
        ${diagramHtml}
        ${imagesHtml}
      </div>
    </div>`;
}

function toggleRich(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const was = el.classList.contains('open');
  document.querySelectorAll('.rich-feat.open').forEach(x => { if (x.id!==id) x.classList.remove('open'); });
  el.classList.toggle('open', !was);
}

function triggerImgUploadHint(path) {
  alert(`Para adicionar esta imagem:\n\n1. Faça upload de "${path}" na pasta /images do repositório portal-release\n2. O portal carregará automaticamente.\n\nOu substitua img.src pelo link direto do Figma.`);
}

// Patch selectRelease to support rich rendering
const _origSelectRelease = selectRelease;
selectRelease = function(id) {
  const r = releases.find(x => x.id === id);
  if (r && r.rich) {
    // rich rendering for D20
    currentId = id;
    document.querySelectorAll('.release-item').forEach(el =>
      el.classList.toggle('active', el.dataset.id === id));

    const allIds = releases.map(r => r.id);
    const idx = allIds.indexOf(id);
    const JIRA = 'https://amigotech-team.atlassian.net/browse/';

    const featsHtml = r.features.map((f,i) => renderRichFeat(f, i, r)).join('');

    document.getElementById('mainContent').innerHTML = `
      <div class="topbar">
        <div class="topbar-left">
          <span class="topbar-version">${r.name}</span>
          <span class="topbar-sep">·</span>
          <span class="topbar-date">${fmt(r.releaseDate)}</span>
          <span class="status-pill ${r.released ? 'pill-released' : 'pill-upcoming'}">${r.released ? '✓ Lançada' : '⏳ Próxima'}</span>
          <span style="font-size:11px;color:var(--text-3);margin-left:4px;padding:3px 8px;background:var(--brand-50);border-radius:4px;font-weight:600">✦ Detalhamento completo</span>
        </div>
        <div class="topbar-nav">
          <button class="nav-btn" onclick="selectRelease('${allIds[idx+1]||''}')" ${idx>=allIds.length-1?'disabled':''}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
          </button>
          <button class="nav-btn" onclick="selectRelease('${allIds[idx-1]||''}')" ${idx<=0?'disabled':''}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>
          </button>
        </div>
      </div>
      <div class="content" id="ci">
        <div class="release-hero">
          <div class="hero-kicker">Release Notes · Amigo Flow</div>
          <div class="hero-title">${r.name}</div>
          <div class="hero-date-row">
            <span class="hero-date">${fmt(r.releaseDate)}</span>
            <span class="status-pill ${r.released ? 'pill-released' : 'pill-upcoming'}">${r.released ? '✓ Lançada' : '⏳ Próxima'}</span>
          </div>
        </div>
        ${r.desc ? `<div class="release-desc-block"><div class="block-label">Resumo da release</div><div class="desc-text">${r.desc}</div></div>` : ''}
        <div class="features-row">
          ${r.features.map(f=>`<span class="ftag">${f.title}</span>`).join('')}
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <div class="block-label" style="margin-bottom:0">${r.features.length} funcionalidades — clique para expandir ↓</div>
          <span style="font-size:11px;color:var(--text-3)">Diagramas e imagens incluídos</span>
        </div>
        <div>${featsHtml}</div>
      </div>`;

    requestAnimationFrame(() => requestAnimationFrame(() => {
      document.getElementById('mainContent').scrollTo(0,0);
      document.getElementById('mainContent').classList.add('anim-in');
    }));
  } else {
    _origSelectRelease(id);
  }
};

// ─── INIT ─────────────────────────────────────────────────────────────────────
buildSidebar(releases);
const first = releases.find(r => r.released) || releases[0];
if (first) selectRelease(first.id);
